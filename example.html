<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="example.css">
</head>
<body>

<div class="container">
    <div class="login-box">
        <h2>Login</h2>

        <form>
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter password">
            </div>

            <button type="submit">Login</button>
        </form>
    </div>
</div>

</body>
</html>
